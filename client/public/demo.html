<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyBoard Split Screen Demo</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }
    .header {
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .controls {
      display: flex;
      gap: 12px;
    }
    button {
      padding: 8px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #2563eb; }
    .container {
      display: flex;
      flex: 1;
      width: 100%;
      transition: all 0.5s ease;
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #334155;
      transition: all 0.5s ease;
      height: 100%;
    }
    .panel:last-child {
      border-right: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .mobile-view .panel:first-child {
      flex: 0 0 375px; /* iPhone width */
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>StudyBoard - Live Collaboration Demo</h2>
    <div class="controls">
      <button onclick="toggleResponsive()">Toggle Responsive View</button>
    </div>
  </div>
  <div class="container" id="container">
    <div class="panel">
      <iframe src="/?room=linkedin-demo-123" id="iframe1"></iframe>
    </div>
    <div class="panel">
      <iframe src="/?room=linkedin-demo-123" id="iframe2"></iframe>
    </div>
  </div>

  <script>
    function toggleResponsive() {
      document.getElementById('container').classList.toggle('mobile-view');
    }
    // Listen for messages if needed
  </script>
</body>
</html>
